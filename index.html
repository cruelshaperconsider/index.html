<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея фотографий</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .photo-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .photo-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
        }

        .photo-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .photo-info {
            padding: 15px;
            text-align: center;
        }

        .photo-info h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 18px;
        }

        .photo-info p {
            color: #666;
            font-size: 14px;
        }

        /* Modal для увеличенного просмотра */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .modal-image {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        .close-btn {
            position: absolute;
            top: 30px;
            right: 45px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: #bbb;
        }

        .upload-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            margin-top: 40px;
        }

        .upload-section h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .upload-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="text"],
        input[type="file"],
        textarea {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: 'Arial', sans-serif;
            font-size: 14px;
        }

        input[type="text"]:focus,
        input[type="file"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.3);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Моя галерея фотографий</h1>
        
        <div class="gallery" id="gallery">
            <!-- Фотографии будут загружены сюда -->
        </div>

        <div class="upload-section">
            <h2>📸 Добавить фотографию</h2>
            <div class="upload-form">
                <input type="text" id="photoTitle" placeholder="Название фотографии">
                <input type="text" id="photoUrl" placeholder="URL ссылка на фотографию (например: https://example.com/photo.jpg)">
                <textarea id="photoDescription" placeholder="Описание фотографии" rows="3"></textarea>
                <button onclick="addPhoto()">Добавить фотографию</button>
            </div>
        </div>
    </div>

    <!-- Modal для увеличенного просмотра -->
    <div id="photoModal" class="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div class="modal-content">
            <img id="modalImage" class="modal-image" src="">
        </div>
    </div>

    <script>
        // Пример фотографий (замените на свои)
        let photos = [
            {
                title: "Красивый пейзаж",
                url: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=500&h=400&fit=crop",
                description: "Горный пейзаж на закате"
            },
            {
                title: "Городской вид",
                url: "https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=500&h=400&fit=crop",
                description: "Ночной город с огнями"
            },
            {
                title: "Природа",
                url: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=500&h=400&fit=crop",
                description: "Зелёный лес и деревья"
            }
        ];

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            
            photos.forEach((photo, index) => {
                const card = document.createElement('div');
                card.className = 'photo-card';
                card.innerHTML = `
                    <img src="${photo.url}" alt="${photo.title}" onclick="openModal('${photo.url}')">
                    <div class="photo-info">
                        <h3>${photo.title}</h3>
                        <p>${photo.description}</p>
                    </div>
                `;
                gallery.appendChild(card);
            });
        }

        function openModal(imageUrl) {
            document.getElementById('photoModal').style.display = 'block';
            document.getElementById('modalImage').src = imageUrl;
        }

        function closeModal() {
            document.getElementById('photoModal').style.display = 'none';
        }

        function addPhoto() {
            const title = document.getElementById('photoTitle').value;
            const url = document.getElementById('photoUrl').value;
            const description = document.getElementById('photoDescription').value;

            if (!title || !url) {
                alert('Пожалуйста, заполните название и URL фотографии');
                return;
            }

            photos.push({
                title: title,
                url: url,
                description: description
            });

            // Очищаем форму
            document.getElementById('photoTitle').value = '';
            document.getElementById('photoUrl').value = '';
            document.getElementById('photoDescription').value = '';

            renderGallery();
            alert('Фотография добавлена! ✨');
        }

        // Закрытие модального окна при клике вне изображения
        window.onclick = function(event) {
            const modal = document.getElementById('photoModal');
            if (event.target == modal) {
                closeModal();
            }
        }

        // Загружаем галерею при загрузке страницы
        renderGallery();
    </script>
</body>
</html>
